name: xscen-dev
channels:
  - conda-forge
dependencies:
  - python >=3.10,<3.15
  - pip >=26.0.1
  # Don't forget to sync changes between environment-docs.yml, environment-dev.yml, and pyproject.toml!
  # Also consider updating the list in xs.utils.show_versions if you add a new package.
  # Main packages
  - cartopy >=0.23.0
  - cftime
  - cf_xarray >=0.7.6
  - clisops >=0.16.1
  - dask >=2024.8.1
  - flox
  - fsspec
  - geopandas >=1.0
  - h5netcdf
  - h5py
  - intake-esm ==2025.2.3
  - matplotlib >=3.6
  - netcdf4
  - numcodecs
  - numpy >=1.24
  - openpyxl
  - pandas >=2.2
  - parse
  - pyarrow >=15.0.0
  - pydantic >=2.8.2
  - pyproj
  - pyyaml
  - rechunker >=0.5.3
  - scipy >=1.11.0
  - shapely >=2.0
  - sparse
  - toolz
  - xarray >=2023.11.0, !=2024.6.0
  - xclim >=0.56, <0.61
  - xsdba >=0.4.0
  - zarr >=2.13, <3
  # Opt
  - nc-time-axis >=1.3.1
  - xesmf >=0.7, !=0.8.8
  # Dev
  - babel >=2.17
  - bump-my-version >=1.3.0
  - codespell >=2.4.2
  - coverage >=7.5.0
  - deptry >=0.25.1
  - flake8 >=7.3.0
  - flake8-rst-docstrings >=0.4.0
  - flit >=3.11.0,<4.0
  - mypy >=1.20.0
  - numpydoc >=1.10.0
  - pooch >=1.8.0
  - prek >=0.3.0
  - pytest >=9.0.2.2
  - pytest-cov >=7.0.0
  - pytest-xdist >=3.2.0
  - ruff >=0.15.9
  - vulture >=2.14
  - watchdog >=6.0.0
  - xdoctest
  - yamllint >=1.35.1
  # Testing
  - tox >=4.52.0
  - tox-gh >=1.7.1
  # Workarounds
  - fastprogress <1.1  # FIXME: Temporary fix for https://github.com/AnswerDotAI/fastprogress/issues/117 (fastprogress is a dep through intake-esm)
